# TechPulse — stack docker-compose (dev local + simulation prod)
#
# Démarrage rapide  : make setup
# Démarrage complet : docker compose --profile full up -d
#
# Services exposés :
#   - MySQL 8          : localhost:3306
#   - phpMyAdmin       : http://localhost:8080   (root / rootpass)
#   - API Flask        : http://localhost:5001   (profile 'full')
#   - Frontend PHP     : http://localhost:8000   (profile 'full')

services:
  mysql:
    image: mysql:8.0
    container_name: techpulse-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-techpulse}
      MYSQL_USER: ${MYSQL_USER:-techpulse}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-techpass}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/migrations/001_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./db/seeds/02_technologies.sql:/docker-entrypoint-initdb.d/02_technologies.sql:ro
      - ./db/migrations/003_alerts.sql:/docker-entrypoint-initdb.d/03_alerts.sql:ro
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - localhost
        - -u
        - root
        - -p${MYSQL_ROOT_PASSWORD:-rootpass}
      interval: 5s
      timeout: 3s
      retries: 20

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: techpulse-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      UPLOAD_LIMIT: 128M
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    depends_on:
      mysql:
        condition: service_healthy

  api:
    profiles: ["full"]
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: techpulse-api
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-techpulse}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-techpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-techpulse}
      FRANCE_TRAVAIL_CLIENT_ID: ${FRANCE_TRAVAIL_CLIENT_ID:-}
      FRANCE_TRAVAIL_CLIENT_SECRET: ${FRANCE_TRAVAIL_CLIENT_SECRET:-}
      PORT: 5001
      APSCHEDULER_ENABLED: ${APSCHEDULER_ENABLED:-0}
    ports:
      - "${API_PORT:-5001}:5001"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    profiles: ["full"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: techpulse-frontend
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-techpulse}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-techpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-techpulse}
      PORT: 80
    ports:
      - "${FRONTEND_PORT:-8000}:80"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
    name: techpulse-mysql-data
