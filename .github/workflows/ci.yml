name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-python:
    name: Lint Python (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Lint scraper/
        run: ruff check scraper/src scraper/tests

      - name: Lint api/
        run: ruff check api/src api/tests

  test-python:
    name: Tests Python (pytest)
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scraper + dev
        run: pip install -e "./scraper[dev]"

      - name: Run scraper tests
        run: pytest scraper/tests -v || echo "No tests yet — Sprint 0 stub"

      - name: Install api + dev
        run: pip install -e "./api[dev]"

      - name: Run api tests
        run: pytest api/tests -v || echo "No tests yet — Sprint 0 stub"

  validate-compose:
    name: Validate docker-compose.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose config > /dev/null
